<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武俠傳說 - 江湖冒險</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'KaiTi', '楷體', serif; background: linear-gradient(135deg, #1a1a2e 0%, #2d1b1b 100%); min-height: 100vh; color: #eee; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #ffd700; margin-bottom: 20px; font-size: 1.8rem; text-shadow: 2px 2px 4px #000; }
        h2 { color: #ff6b6b; text-align: center; margin: 15px 0; }
        .stats { background: rgba(255,215,0,0.1); border: 2px solid #ffd700; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center; }
        .stat { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 8px; }
        .stat-label { font-size: 0.65rem; color: #aaa; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: #ffd700; }
        .inventory-bar { background: rgba(255,215,0,0.1); border: 1px solid #8b4513; border-radius: 8px; padding: 10px; margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .item { background: linear-gradient(90deg, #8b4513, #d2691e); padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; color: #fff; }
        .scene { background: rgba(255,255,255,0.05); border: 1px solid #ffd700; border-radius: 12px; padding: 20px; margin-bottom: 20px; min-height: 200px; }
        .scene-title { color: #ffd700; margin-bottom: 15px; font-size: 1.2rem; text-align: center; }
        .scene-text { line-height: 1.8; margin-bottom: 20px; white-space: pre-wrap; text-align: justify; }
        .choices { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn { background: linear-gradient(90deg, #8b0000, #b22222); border: 2px solid #ffd700; color: #fff; padding: 12px 18px; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; text-align: left; font-family: 'KaiTi', serif; }
        .choice-btn:hover { transform: scale(1.02); background: linear-gradient(90deg, #a52a2a, #cd5c5c); }
        .log { background: rgba(0,0,0,0.5); border: 1px solid #8b4513; border-radius: 8px; padding: 12px; max-height: 120px; overflow-y: auto; font-size: 0.8rem; color: #aaa; }
        .log-entry { margin-bottom: 6px; border-bottom: 1px solid #333; padding-bottom: 6px; }
        .hp-bar { background: rgba(255,0,0,0.3); height: 6px; border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .hp-fill { background: #ff4444; height: 100%; transition: width 0.3s; }
        .sect { font-size: 0.7rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ 武俠傳說 🗡️</h1>
        
        <div class="stats">
            <div class="stat"><div class="stat-label">武力</div><div class="stat-value" id="martial">10</div></div>
            <div class="stat"><div class="stat-label">內力</div><div class="stat-value" id="inner">10</div></div>
            <div class="stat"><div class="stat-label">悟性</div><div class="stat-value" id="comprehension">10</div></div>
            <div class="stat"><div class="stat-label">生命</div><div class="stat-value" id="hp">100</div><div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div></div>
        </div>
        
        <div class="inventory-bar" id="inventory">
            <span style="color:#888;font-size:0.8rem;">背包：空</span>
        </div>
        
        <div class="scene">
            <div class="scene-title" id="scene-title">🏮 楔子</div>
            <div class="scene-text" id="scene-text">大宋年間，江湖動亂。\n\n你是一名流浪劍客，自幼被少林寺收養，卻因犯戒被逐出師門。\n\n師父臨終前告訴你：\n\n「江湖傳說中的《九陰真經》再現人間，\n得此經者，可稱霸武林...」\n\n──────────────\n💡 提示：收集四本秘笈碎片\n   成為一代宗師！</div>
            <div class="choices" id="choices"></div>
        </div>
        
        <div class="log" id="log">
            <div class="log-entry">🥷 江湖冒險開始——習得絕世武功！</div>
        </div>
    </div>

            masterMet: [],

            '獨孤九劍': { desc: '無敵劍法', effect: { martial: 25 } },

            '金絲寶甲': { desc: '防護至寶', effect: { hp: 50 } },
            '倚天劍': { desc: '削鐵如泥的神兵', effect: { martial: 15 } },

        function updateStats() {
            document.getElementById('martial').textContent = state.martial;
            document.getElementById('inner').textContent = state.inner;
            document.getElementById('comprehension').textContent = state.comprehension;
            document.getElementById('hp').textContent = state.hp;
            document.getElementById('hp-fill').style.width = Math.max(0, state.hp) + '%';
            
            const inv = document.getElementById('inventory');
            if (state.inventory.length === 0) {
                inv.innerHTML = '<span style="color:#888;font-size:0.8rem;">背包：空</span>';
            } else {
                inv.innerHTML = '背包：' + state.inventory.map(item => `<span class="item">${item}</span>`).join(' ');
            }
            
            if (state.hp <= 0) {
                alert('💀 你已身負重傷，江湖路遠...');
                resetGame();
            }
        }

        function resetGame() {
            state.martial = 10;
            state.inner = 10;
            state.comprehension = 10;
            state.hp = 100;
            state.inventory = [];
            state.manuals = { nineYin: false, dragon: false, heaven: false, sword: false };
            renderScene('restart');
            updateStats();
        }

        function addLog(text) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = text;
            log.insertBefore(entry, log.firstChild);
        }

        function renderScene(sceneId) {
            const scene = scenes[sceneId];
            if (!scene) return;
            
            state.currentScene = sceneId;
            document.getElementById('scene-title').textContent = scene.title;
            document.getElementById('scene-text').textContent = scene.text;
            
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            
            scene.choices.forEach(choice => {
                if (choice.condition && !choice.condition()) return;
                
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice.text;
                btn.onclick = () => {
                    if (choice.effect) {
                        Object.keys(choice.effect).forEach(key => {
                            if (key === 'hp') {
                                state.hp = Math.min(state.maxHp, state.hp + choice.effect[key]);
                            } else {
                                state[key] = (state[key] || 0) + choice.effect[key];
                            }
                        });
                        addLog(choice.effect ? JSON.stringify(choice.effect).replace(/[{}"]/g,'') : '');
                    }
                    
                    if (choice.addItem) {
                        state.inventory.push(choice.addItem);
                        addLog('🎁 獲得：' + choice.addItem);
                    }
                    
                    if (choice.removeItem) {
                        const idx = state.inventory.indexOf(choice.removeItem);
                        if (idx > -1) state.inventory.splice(idx, 1);
                    }
                    
                    if (choice.reset) {
                        resetGame();
                        return;
                    }
                    
                    updateStats();
                    renderScene(choice.next);
                };
                choicesDiv.appendChild(btn);
            });
        }

        updateStats();
        renderScene('start');
    </script>
</body>
</html>
