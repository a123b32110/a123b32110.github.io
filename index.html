            kuihua:{t:'🗡️ 葵花',txt:'【笑傲】\n\n「欲練此功...」',c:[{txt:'🔪 修煉',n:'huashan',e:{m:40,i:-10},add:'葵花寶典',nov:'笑傲江湖'}]},
