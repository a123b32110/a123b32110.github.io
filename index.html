            if(s.t==='內功')cls='tag-neigong';
            else if(s.t==='外功')cls='tag-waigong';
            else if(s.t==='拳法')cls='tag-quan';
            else if(s.t==='掌法')cls='tag-zhang';
            else if(s.t==='指法')cls='tag-zhi';
            else if(s.t==='腿法')cls='tag-tui';
            else if(s.t==='輕功')cls='tag-qinggong';
            return'<span class="skill-tag '+cls+'">'+s.t+'</span>';
        }
        
        function up(){
            document.getElementById('martial').innerText=state.martial;
            document.getElementById('inner').innerText=state.inner;
            document.getElementById('comprehension').innerText=state.comprehension;
            document.getElementById('hp').innerText=state.hp;
            document.getElementById('hp-fill').style.width=Math.max(0,state.hp)+'%';
            var invHtml=state.inventory.length?
                '背包：'+state.inventory.map(function(i){return i+getTagHtml(i);}).join(' '):
                '<span style="color:#555;font-size:0.7rem;">背包：空</span>';
            document.getElementById('inventory').innerHTML=invHtml;
            if(state.hp<=0){alert('💀');reset();}
        }
        function reset(){state.m=state.i=state.c=10;state.hp=100;state.inv=[];rs('restart');up();}
        function log(t){var l=document.getElementById('log'),e=document.createElement('div');e.className='log-entry';e.innerText=t;l.insertBefore(e,l.firstChild);}
        function rs(id){
            var s=scenes[id];
            if(!s)return;
            state.cs=id;
            document.getElementById('scene-title').innerText=s.t;
            document.getElementById('scene-text').innerText=s.txt;
            var cd=document.getElementById('choices');
            cd.innerHTML='';
            s.c.forEach(function(c){
                if(c.cd&&!c.cd())return;
                var b=document.createElement('button');
                b.className='choice-btn';
                b.innerText=c.txt;
                b.onclick=function(){
                    if(c.e)Object.keys(c.e).forEach(function(k){
                        if(k=='hp')state.hp=Math.min(100,state.hp+c.e[k]);
                        else if(k=='m')state.martial+=(c.e[k]||0);
                        else if(k=='i')state.inner+=(c.e[k]||0);
                        else if(k=='c')state.comprehension+=(c.e[k]||0);
                        else if(k=='r')state.reputation+=(c.e[k]||0);
                    });
                    if(c.add){
                        state.inventory.push(c.add);
                        log('🎁 '+c.add+' ('+(skills[c.add]?skills[c.add].t:'')+')');
                    }
                    if(c.nov&&!state.novels.includes(c.nov)){
                        state.novels.push(c.nov);
                        log('📖 '+c.nov);
                    }
                    if(c.rst){reset();return;}
                    up();rs(c.n);
                };
                cd.appendChild(b);
            });
        }
        up();rs('start');
    </script>
</body>
</html>
