<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的江湖</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'KaiTi','楷體',serif;background:#0a0a0a;color:#d4d4d4;padding:8px;min-height:100vh;background-image:radial-gradient(circle,#1a1a2e,#0a0a0a)}
.container{max-width:480px;margin:0 auto}
h1{text-align:center;color:#c9a227;margin:10px 0;font-size:1.4rem;letter-spacing:3px;border-bottom:2px solid #3a3a2a;padding-bottom:6px}
.panel{background:rgba(20,18,15,0.95);border:1px solid #4a4a3a;border-radius:8px;padding:10px;margin-bottom:10px}
.panel-title{color:#c9a227;font-size:0.9rem;margin-bottom:6px;text-align:center;border-bottom:1px solid #3a3a2a;padding-bottom:4px}
.stat-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #2a2a2a}
.stat-label{color:#888}
.stat-val{color:#c9a227;font-weight:bold}
.bar{height:8px;background:#222;border-radius:4px;overflow:hidden;margin-top:2px}
.bar-fill{height:100%;transition:width 0.3s}
.hp-fill{background:linear-gradient(90deg,#8b0000,#ff4500)}
.mp-fill{background:linear-gradient(90deg,#1a008b,#4400ff)}
.exp-fill{background:linear-gradient(90deg,#1a5a8b,#00d4ff)}
.btn{display:block;width:100%;padding:8px;margin:3px 0;background:linear-gradient(135deg,#2a2015,#3a3025);border:1px solid #5a5a4a;color:#c9a227;border-radius:5px;cursor:pointer;font-family:'KaiTi',serif;font-size:0.85rem}
.btn:hover{background:linear-gradient(135deg,#3a3025,#4a4035);border-color:#c9a227}
.faction-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.faction-btn{padding:10px 3px;text-align:center;background:#1a1815;border:2px solid #3a3a2a;border-radius:5px;cursor:pointer}
.faction-btn:hover{border-color:#c9a227}
.faction-icon{font-size:1.2rem;display:block}
.faction-name{color:#c9a227;font-size:0.7rem}
.map-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.map-btn{padding:10px;text-align:center;background:#1a1815;border:1px solid #3a3a2a;border-radius:5px;cursor:pointer;font-size:0.8rem}
.map-btn:hover{border-color:#c9a227}
.skill-grid{display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.skill-chip{padding:3px 6px;background:#1a1815;border:1px solid #3a3a2a;border-radius:8px;font-size:0.65rem;color:#c9a227}
.skill-chip.learned{border-color:#00ff88;background:#1a2515}
/* 戰鬥區域 */
.battle-panel{background:rgba(20,18,15,0.95);border:2px solid #4a4a3a;border-radius:8px;padding:10px}
.battle-hp{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.battle-char{flex:1;text-align:center}
.battle-char .name{font-size:0.9rem;margin-bottom:3px}
.battle-char.player .name{color:#66ff66}
.battle-char.enemy .name{color:#ff6666}
.battle-hp-bar{width:100px;height:10px;background:#222;border-radius:5px;overflow:hidden;margin:0 auto}
.battle-hp-fill{height:100%;transition:width 0.3s}
.battle-hp-fill.hp{background:linear-gradient(90deg,#8b0000,#ff4500)}
.battle-hp-fill.mp{background:linear-gradient(90deg,#1a008b,#4400ff)}
.battle-hp-text{font-size:0.7rem;color:#888;margin-top:2px}
.battle-vs{font-size:1rem;color:#c9a227;padding:0 8px}
.battle-char-info{display:flex;justify-content:space-around;margin-bottom:8px}
.char-stat{text-align:center;font-size:0.65rem;color:#666}
/* 訊息區在中間 */
.combat-log{background:#0a0a0a;border:1px solid #3a3a2a;border-radius:5px;padding:8px;height:70px;overflow-y:auto;font-size:0.7rem;margin:8px 0}
.log-entry{margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid #1a1a1a}
.log-enemy{color:#ff6666}
.log-player{color:#66ff66}
.log-skill{color:#c9a227}
.log-win{color:#00ff88}
.log-lose{color:#ff4444}
/* 操作區在下方 */
.battle-actions{display:flex;gap:4px;margin-top:8px}
.battle-btn{flex:1;padding:10px 5px;background:linear-gradient(135deg,#3a1515,#5a2020);border:1px solid #8b0000;color:#ff6666;border-radius:5px;cursor:pointer;font-size:0.8rem}
.battle-btn.special{background:linear-gradient(135deg,#15153a,#20205a);border-color:#0000ff;color:#6666ff}
.battle-btn.heal{background:linear-gradient(135deg,#153a15,#205a20);border-color:#008800;color:#66ff66}
.battle-btn.run{background:linear-gradient(135deg,#2a2a2a,#3a3a3a);border-color:#666;color:#aaa}
.result-title{font-size:1.3rem;margin-bottom:10px;text-align:center}
.result-stats{background:rgba(0,0,0,0.5);padding:12px;border-radius:8px;margin-bottom:12px;text-align:center}
.result-btn{background:linear-gradient(135deg,#2a2015,#3a3025);border:1px solid #c9a227;color:#c9a227;padding:10px 25px;border-radius:5px;font-size:0.9rem;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<h1>你的江湖</h1>
<!-- 屬性 -->
<div class="panel" id="stats-panel">
<div class="panel-title">📊 屬性</div>
<div class="stat-row"><span class="stat-label">等級</span><span class="stat-val" id="level">1</span></div>
<div class="bar"><div class="bar-fill exp-fill" id="exp-bar" style="width:0%"></div></div>
<div class="stat-row"><span class="stat-label">生命</span><span class="stat-val"><span id="hp">100</span>/<span id="max-hp">100</span></span></div>
<div class="bar"><div class="bar-fill hp-fill" id="hp-bar" style="width:100%"></div></div>
<div class="stat-row"><span class="stat-label">內力</span><span class="stat-val"><span id="mp">50</span>/<span id="max-mp">50</span></span></div>
<div class="bar"><div class="bar-fill mp-fill" id="mp-bar" style="width:100%"></div></div>
<div class="stat-row"><span class="stat-label">攻擊</span><span class="stat-val" id="atk">10</span></div>
<div class="stat-row"><span class="stat-label">防禦</span><span class="stat-val" id="def">5</span></div>
<div class="stat-row"><span class="stat-label">銀兩</span><span class="stat-val" id="gold">100</span></div>
</div>
<!-- 主選單 -->
<div class="panel" id="main-menu">
<button class="btn" onclick="showFaction()">🎮 創建角色</button>
<button class="btn" onclick="showMap()">🗺️ 江湖地圖</button>
<button class="btn" onclick="showSkills()">📖 武學</button>
</div>
<!-- 門派 -->
<div class="panel hidden" id="faction-panel">
<div class="panel-title">🏯 選擇門派</div>
<div class="faction-grid">
<div class="faction-btn" onclick="selectFaction('少林')"><span class="faction-icon">🏯</span><span class="faction-name">少林</span></div>
<div class="faction-btn" onclick="selectFaction('丐幫')"><span class="faction-icon">🍚</span><span class="faction-name">丐幫</span></div>
<div class="faction-btn" onclick="selectFaction('明教')"><span class="faction-icon">🔥</span><span class="faction-name">明教</span></div>
<div class="faction-btn" onclick="selectFaction('日月')"><span class="faction-icon">🌙</span><span class="faction-name">日月</span></div>
<div class="faction-btn" onclick="selectFaction('逍遙')"><span class="faction-icon">🌀</span><span class="faction-name">逍遙</span></div>
<div class="faction-btn" onclick="selectFaction('華山')"><span class="faction-icon">🏔️</span><span class="faction-name">華山</span></div>
</div>
<button class="btn" onclick="showMain()">返回</button>
</div>
<!-- 地圖 -->
<div class="panel hidden" id="map-panel">
<div class="panel-title">🗺️ 江湖地圖</div>
<div class="map-grid">
<div class="map-btn" onclick="travel('洛陽')">洛陽</div>
<div class="map-btn" onclick="travel('揚州')">揚州</div>
<div class="map-btn" onclick="travel('少林')">少林</div>
<div class="map-btn" onclick="travel('華山')">華山</div>
<div class="map-btn" onclick="travel('光明頂')">光明頂</div>
<div class="map-btn" onclick="travel('襄陽')">襄陽</div>
</div>
<div id="location-desc" style="margin-top:8px;color:#666;font-size:0.75rem;text-align:center"></div>
<button class="btn" onclick="showMain()">返回</button>
</div>
<!-- 技能 -->
<div class="panel hidden" id="skill-panel">
<div class="panel-title">📖 武學修煉</div>
<div class="skill-grid" id="skill-tree"></div>
<button class="btn" onclick="showMain()">返回</button>
</div>
<!-- 戰鬥 -->
<div class="panel hidden" id="battle-panel">
<!-- 血條區在上方 -->
<div class="battle-panel">
<div class="panel-title">⚔️ 戰鬥</div>
<div class="battle-hp">
<div class="battle-char enemy"><div class="name" id="enemy-name">敵人</div><div class="battle-hp-bar"><div class="battle-hp-fill hp" id="enemy-hp-bar" style="width:100%"></div></div><div class="battle-hp-text"><span id="enemy-hp">50</span>/<span id="enemy-max-hp">50</span></div></div>
<div class="battle-vs">VS</div>
<div class="battle-char player"><div class="name">你</div><div class="battle-hp-bar"><div class="battle-hp-fill hp" id="player-hp-bar" style="width:100%"></div></div><div class="battle-hp-text"><span id="player-hp">100</span>/<span id="player-max-hp">100</span></div></div>
</div>
<!-- 玩家內力條 -->
<div class="battle-char-info">
<div class="char-stat">攻:<span id="battle-atk">10</span></div>
<div class="char-stat">防:<span id="battle-def">5</span></div>
<div class="char-stat">內:<span id="battle-mp">50</span></div>
</div>
<!-- 訊息區在中間 -->
<div class="combat-log" id="combat-log"></div>
<!-- 操作區在下方 -->
<div class="battle-actions">
<button class="battle-btn" onclick="battleAttack()">⚔️ 攻擊</button>
<button class="battle-btn special" onclick="battleSkill()">📖 絕技</button>
<button class="battle-btn heal" onclick="battleHeal()">💊 療</button>
<button class="battle-btn run" onclick="battleRun()">🏃</button>
</div>
</div>
</div>
<!-- 結果 -->
<div class="panel hidden" id="result-panel">
<div class="result-title" id="result-title">🏆 勝利</div>
<div class="result-stats" id="result-stats"></div>
<button class="result-btn" onclick="continueBattle()">繼續</button>
</div>
</div>
<script>
const game={faction:'',level:1,exp:0,maxExp:100,hp:100,maxHp:100,mp:50,maxMp:50,atk:10,def:5,gold:100,skills:[],location:'洛陽',inBattle:false,enemy:null,battleWon:false,battleExp:0,battleGold:0};
const factions={少林:{skills:['金鐘罩','易筋經','少林棍法'],bonus:{def:3,hp:20}},丐幫:{skills:['降龍十八掌','打狗棒法'],bonus:{atk:3}},明教:{skills:['乾坤大挪移','聖火令'],bonus:{atk:2,mp:20}},日月:{skills:['葵花寶典','吸星大法'],bonus:{atk:2,comp:3}},逍遙:{skills:['天山六陽掌','凌波微步','北冥神功'],bonus:{mp:30,comp:2}},華山:{skills:['獨孤九劍','太極劍'],bonus:{atk:3,def:2}}};
const skillData={基礎拳法:{dmg:10},金鐘罩:{def:5},易筋經:{hp:30},降龍十八掌:{dmg:50,mp:30},打狗棒法:{dmg:35,mp:15},乾坤大挪移:{dmg:40,mp:25},葵花寶典:{atk:10},吸星大法:{dmg:30,mp:20},天山六陽掌:{dmg:38,mp:18},凌波微步:{luck:5},獨孤九劍:{dmg:55,mp:35}};
const enemies={山賊:{hp:30,atk:8,def:2,exp:15,gold:10},土匪:{hp:40,atk:10,def:3,exp:20,gold:15},強盜:{hp:50,atk:12,def:4,exp:25,gold:20},殺手:{hp:70,atk:18,def:6,exp:40,gold:35},武僧:{hp:80,atk:20,def:10,exp:50,gold:40}};
function updateUI(){document.getElementById('level').textContent=game.level;document.getElementById('exp-bar').style.width=(game.exp/game.maxExp*100)+'%';document.getElementById('hp').textContent=game.hp;document.getElementById('max-hp').textContent=game.maxHp;document.getElementById('hp-bar').style.width=(game.hp/game.maxHp*100)+'%';document.getElementById('mp').textContent=game.mp;document.getElementById('max-mp').textContent=game.maxMp;document.getElementById('mp-bar').style.width=(game.mp/game.maxMp*100)+'%';document.getElementById('atk').textContent=game.atk;document.getElementById('def').textContent=game.def;document.getElementById('gold').textContent=game.gold;}
function showPanel(id){document.querySelectorAll('.panel').forEach(p=>p.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function showMain(){showPanel('main-menu');}
function showFaction(){showPanel('faction-panel');}
function showMap(){showPanel('map-panel');updateLocation();}
function showSkills(){showPanel('skill-panel');renderSkills();}
function selectFaction(f){game.faction=f;const fb=factions[f];game.skills=[...fb.skills];game.maxHp+=fb.bonus.hp||0;game.hp=game.maxHp;game.mp+=fb.bonus.mp||0;game.maxMp=game.mp;game.atk+=fb.bonus.atk||0;game.def+=fb.bonus.def||0;updateUI();showMain();addLog('🏮 歡迎加入'+f+'！');}
function renderSkills(){const tree=document.getElementById('skill-tree');tree.innerHTML='';Object.keys(skillData).forEach(s=>{const chip=document.createElement('div');chip.className='skill-chip'+(game.skills.includes(s)?' learned':'');chip.textContent=s;tree.appendChild(chip);});}
function updateLocation(){const desc={洛陽:'繁華都市',揚州:'江南魚米鄉',少林:'天下武學正宗',華山:'五嶽劍派',光明頂:'明教總壇',襄陽:'宋蒙邊境'};document.getElementById('location-desc').textContent=desc[game.location]||'';}
function travel(loc){game.location=loc;updateLocation();if(Math.random()<0.4){const et=Object.keys(enemies)[Math.floor(Math.random()*Object.keys(enemies).length)];startBattle(et);}else{addLog('🏃 前往'+loc+'...');}}
function startBattle(enemyType){game.inBattle=true;game.battleWon=false;game.battleExp=0;game.battleGold=0;const e=enemies[enemyType];game.enemy={...e,name:enemyType,currentHp:e.hp};showPanel('battle-panel');updateBattleUI();addLog('⚔️ 遭遇'+enemyType+'！');}
function updateBattleUI(){document.getElementById('enemy-name').textContent=game.enemy.name;document.getElementById('enemy-hp').textContent=game.enemy.currentHp;document.getElementById('enemy-max-hp').textContent=game.enemy.hp;document.getElementById('enemy-hp-bar').style.width=(game.enemy.currentHp/game.enemy.hp*100)+'%';document.getElementById('player-hp').textContent=game.hp;document.getElementById('player-max-hp').textContent=game.maxHp;document.getElementById('player-hp-bar').style.width=(game.hp/game.maxHp*100)+'%';document.getElementById('battle-atk').textContent=game.atk;document.getElementById('battle-def').textContent=game.def;document.getElementById('battle-mp').textContent=game.mp;}
function addLog(msg,cls=''){const log=document.getElementById('combat-log');const entry=document.createElement('div');entry.className='log-entry '+cls;entry.textContent=msg;log.insertBefore(entry,log.firstChild);}
function battleAttack(){if(!game.inBattle)return;let dmg=Math.max(1,game.atk-game.enemy.def+Math.floor(Math.random()*5));game.enemy.currentHp-=dmg;addLog('⚔️ 造成'+dmg+'傷害','log-player');if(game.enemy.currentHp>0){let ed=Math.max(1,game.enemy.atk-game.def+Math.floor(Math.random()*3));game.hp-=ed;addLog('👹 受'+ed+'傷害','log-enemy');}updateBattleUI();checkBattleEnd();}
function battleSkill(){if(!game.inBattle)return;const us=game.skills.filter(s=>skillData[s]&&skillData[s].dmg);if(us.length===0){alert('沒有絕技！');return;}const s=skillData[us[Math.floor(Math.random()*us.length)]];if(game.mp<s.mp){alert('內力不足！');return;}game.mp-=s.mp;let dmg=s.dmg+Math.floor(game.atk/2);game.enemy.currentHp-=dmg;addLog('📖 造成'+dmg+'傷害！','log-skill');if(game.enemy.currentHp>0){let ed=Math.max(1,game.enemy.atk-game.def);game.hp-=ed;addLog('👹 受傷','log-enemy');}updateBattleUI();checkBattleEnd();}
function battleHeal(){if(!game.inBattle)return;game.hp=Math.min(game.maxHp,game.hp+10);game.mp=Math.max(0,game.mp-5);addLog('💊 恢復10HP','log-player');let ed=Math.max(1,game.enemy.atk-game.def);game.hp-=ed;addLog('👹 受傷','log-enemy');updateBattleUI();checkBattleEnd();}
function battleRun(){if(!game.inBattle)return;if(Math.random()<0.5){addLog('🏃 逃跑成功！','log-player');game.inBattle=false;showMap();}else{addLog('🏃 逃跑失敗！','log-enemy');let ed=game.enemy.atk;game.hp-=ed;addLog('👹 被攻擊！','log-enemy');updateBattleUI();checkBattleEnd();}}
function checkBattleEnd(){if(game.hp<=0){game.inBattle=false;game.battleWon=false;showResult();}else if(game.enemy.currentHp<=0){game.inBattle=false;game.battleWon=true;game.battleExp=game.enemy.exp;game.battleGold=game.enemy.gold;game.exp+=game.battleExp;game.gold+=game.battleGold;showResult();}}
function showResult(){const title=document.getElementById('result-title');const stats=document.getElementById('result-stats');if(game.battleWon){title.textContent='🏆 勝利！';title.style.color='#00ff88';stats.innerHTML='<div style="color:#c9a227;margin:8px 0">經驗 +'+game.battleExp+' | 銀兩 +'+game.battleGold+'</div><div style="color:#888;font-size:0.75rem">等級:'+game.level+' 經驗:'+game.exp+'/'+game.maxExp+'</div>';if(game.exp>=game.maxExp){game.level++;game.exp-=game.maxExp;game.maxExp=Math.floor(game.maxExp*1.5);game.atk+=2;game.def+=1;game.maxHp+=10;game.hp=game.maxHp;stats.innerHTML+='<div style="color:#00ff88;margin-top:8px">⭐ 升級！</div>';}}else{title.textContent='💀 失敗...';title.style.color='#ff4444';stats.innerHTML='<div style="color:#888">修養後再戰！</div>';}updateUI();showPanel('result-panel');}
function continueBattle(){game.inBattle=false;if(game.hp>0){showMap();}else{game.hp=Math.floor(game.maxHp/2);game.mp=Math.floor(game.maxMp/2);showMain();}updateUI();}
addLog('🏮 請選擇門派開始遊戲！');
updateUI();
</script>
</body>
</html>
