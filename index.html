        .scene { background: linear-gradient(180deg, rgba(20,15,10,0.95), rgba(10,20,10,0.9)); border: 2px solid #ffd700; border-radius: 12px; padding: 15px; margin-bottom: 15px; min-height: 220px; box-shadow: 0 0 20px rgba(255,215,0,0.15); }
        .scene-title { color: #ff6b00; margin-bottom: 12px; font-size: 1.15rem; text-align: center; text-shadow: 0 0 8px #ff6b00; border-bottom: 1px solid #4a3520; padding-bottom: 8px; }
        .scene-text { line-height: 1.9; margin-bottom: 15px; white-space: pre-wrap; text-align: justify; font-size: 0.9rem; color: #d4d4d4; }
        .choices { display: flex; flex-direction: column; gap: 8px; }
        .choice-btn { background: linear-gradient(90deg, #4a1a0a, #8b2500); border: 1px solid #ffd700; color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; text-align: left; font-family: 'KaiTi', serif; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .choice-btn:hover { transform: scale(1.01); background: linear-gradient(90deg, #8b2500, #b22200); box-shadow: 0 0 15px #ff6b00; }
        .log { background: rgba(0,0,0,0.7); border: 1px solid #4a3520; border-radius: 8px; padding: 10px; max-height: 100px; overflow-y: auto; font-size: 0.75rem; color: #888; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .hp-bar { background: rgba(80,0,0,0.5); height: 5px; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .hp-fill { background: linear-gradient(90deg, #ff0000, #ff4444); height: 100%; transition: width 0.3s; box-shadow: 0 0 5px #ff0000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ 武俠傳說 🗡️</h1>
        <div class="stats">
            <div class="stat"><div class="stat-label">⚔️武力</div><div class="stat-value" id="martial">10</div></div>
            <div class="stat"><div class="stat-label">💪內力</div><div class="stat-value" id="inner">10</div></div>
            <div class="stat"><div class="stat-label">🧠悟性</div><div class="stat-value" id="comprehension">10</div></div>
            <div class="stat"><div class="stat-label">❤️生命</div><div class="stat-value" id="hp">100</div><div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div></div>
        </div>
        <div class="inventory-bar" id="inventory"><span style="color:#666;font-size:0.75rem;">背包：空</span></div>
        <div class="scene">
            <div class="scene-title" id="scene-title">🏮 楔子</div>
            <div class="scene-text" id="scene-text">大宋年間，江湖動盪。\n\n你是一名流浪劍客，自幼被少林寺收養，卻因犯戒被逐出師門。\n\n師父臨終前告訴你：「九陰真經再現人間...」\n\n──────────────\n💡 體驗20部經典武俠劇情！</div>
            <div class="choices" id="choices"></div>
        </div>
        <div class="log" id="log"><div class="log-entry">🥷 江湖冒險開始——習得絕世武功！</div></div>
    </div>

        const scenes = {
            start: { title: '🏮 楔子', text: '大宋年間，江湖動盪。\n\n你是一名流浪劍客，被少林寺逐出。\n\n師父臨終：「九陰真經再現人間...」\n\n💡 體驗20部武俠經典！', choices: [ { text: '🏯 少林寺（劍來/天龍）', next: 'shaolin' }, { text: '🌲 客棧（射鵰/倚天）', next: 'inn' }, { text: '⛰️ 閉關（凡人/大唐）', next: 'cultivate' }, { text: '🏔️ 華山（神鵰/笑傲）', next: 'huashan' }, { text: '🌊 怒蛟幫（覆雨）', next: 'nujiao' } ] },
            // 劍來+天龍

            // 射鵰+神鵰
            inn: { title: '🌲 客棧', text: '【射鵰英雄】\n\n郭靖走進來：「蒙古要打來了！」\n\n【神鵰】襄陽大戰將起！', choices: [ { text: '🛡️ 守襄陽', next: 'xiangyang', effect: { reputation: 20 } }, { text: '🍔 洪七公', next: 'hong', effect: { inner: 15 } }, { text: '⚔️ 歐陽鋒', next: 'ouyang', effect: { martial: 15 } }, { text: '👀 聽情報', next: 'listen', effect: { comprehension: 10 } } ] },
            listen: { title: '📜 傳聞', text: '華山論劍！九陰真經！蒙古備戰！桃花島！', choices: [ { text: '👍 繼續', next: 'inn2', effect: { comprehension: 10 } } ] },
            hong: { title: '🍔 洪七公', text: '【射鵰】\n\n「小子！我餓了！」\n\n「好！教你降龍十八掌！」', choices: [ { text: '🐉 學掌法', next: 'inn2', effect: { martial: 30 }, addItem: '降龍十八掌', novel: '射鵰英雄' } ] },
            ouyang: { title: '⚔️ 歐陽鋒', text: '【射鵰】\n\n「好！傳你蛤蟆功！」', choices: [ { text: '🐸 蛤蟆功', next: 'inn2', effect: { inner: 25 }, addItem: '蛤蟆功', novel: '射鵰英雄' } ] },
            xiangyang: { title: '🛡️ 襄陽', text: '【神鵰】蒙古大軍壓境！\n\n郭靖黃蓉楊過小龍女！', choices: [ { text: '⚔️ 斬蒙哥', next: 'hero', effect: { martial: 30 } }, { text: '🛡️ 守城', next: 'defend', effect: { reputation: 30 } }, { text: '🐉 楊過', next: 'yangguo', effect: { martial: 20 } } ] },
            hero: { title: '🏆 英雄', text: '【神鵰】\n\n斬殺蒙哥！成為民族英雄！\n\n俠之大者！', choices: [ { text: '🏆 繼續', next: 'inn2', effect: { reputation: 100, martial: 20 }, novel: '神鵰俠侶' } ] },
            defend: { title: '🛡️ 守護', text: '【神鵰】襄陽保住！\n\n郭靖：「俠之大者！」', choices: [ { text: '🙏 繼續', next: 'inn2', effect: { reputation: 50, inner: 15 }, novel: '神鵰俠侶' } ] },
            yangguo: { title: '🐉 楊過', text: '【神鵰】\n\n黯然銷魂掌！', choices: [ { text: '🗡️ 學掌法', next: 'inn2', effect: { martial: 25 }, novel: '神鵰俠侶' } ] },
            // 倚天
            inn2: { title: '🌲 客棧Ⅱ', text: '【倚天屠龍】\n\n金毛獅王謝遜！\n\n「成昆！出來！」', choices: [ { text: '⚔️ 對付謝遜', next: 'xiezun', effect: { martial: 15 } }, { text: '🏺 屠龍刀', next: 'blade', effect: { comprehension: 15 } }, { text: '💕 週芷若', next: 'zhouzhi', effect: { inner: 10 } }, { text: '🧘 峨眉', next: 'emei', effect: { inner: 10 } } ] },
            xiezun: { title: '⚔️ 謝遜', text: '【倚天】七傷拳！', choices: [ { text: '💪 全力', next: 'xiezun_win', condition: () => state.martial >= 25 }, { text: '🧠 用計', next: 'xiezun_trick', condition: () => state.comprehension >= 15 } ] },
            xiezun_win: { title: '🏆 擊退', text: '【倚天】謝遜敗走！', choices: [ { text: '➡️ 繼續', next: 'inn3', effect: { martial: 20, reputation: 10 }, novel: '倚天屠龍' } ] },
            xiezun_trick: { title: '🧠 智取', text: '【倚天】計退謝遜！', choices: [ { text: '➡️ 繼續', next: 'inn3', effect: { comprehension: 15 }, novel: '倚天屠龍' } ] },
            blade: { title: '🏺 屠龍', text: '【倚天】武林至尊！寶刀屠龍！', choices: [ { text: '⚔️ 取得', next: 'inn3', effect: { martial: 25 }, addItem: '屠龍刀', novel: '倚天屠龍' } ] },
            zhouzhi: { title: '💕 週芷若', text: '【倚天】峨眉九陽功！', choices: [ { text: '💖 結伴', next: 'inn3', effect: { inner: 15 }, novel: '倚天屠龍' } ] },
            emei: { title: '🧘 峨眉', text: '【倚天】九陽真經！', choices: [ { text: '📜 學習', next: 'inn3', effect: { inner: 25 }, addItem: '九陽真經', novel: '倚天屠龍' } ] },
            // 笑傲
            inn3: { title: '🌲 客棧Ⅲ', text: '【笑傲江湖】\n\n日月神教！東方不敗！\n\n任我行：「吸星大法！」', choices: [ { text: '⚔️ 東方', next: 'dongfang', effect: { martial: 20 } }, { text: '🗡️ 葵花', next: 'kuihua', effect: { comprehension: 15 } }, { text: '🖐️ 吸星', next: 'mixing', effect: { inner: 25 } }, { text: '🏴‍☠️ 魔教', next: 'mojiao', effect: { inner: 15 } } ] },
            mixing: { title: '🖐️ 吸星', text: '【笑傲】任我行傳功！', choices: [ { text: '🧘 修煉', next: 'huashan', effect: { inner: 30 }, addItem: '吸星大法', novel: '笑傲江湖' } ] },
            dongfang: { title: '⚔️ 東方', text: '【笑傲】葵花寶典！', choices: [ { text: '💪 硬拚', next: 'fail', effect: { hp: -40 } }, { text: '🧠 破綻', next: 'win', condition: () => state.comprehension >= 25 } ] },
            fail: { title: '💀 敗', text: '重傷逃脫...', choices: [ { text: '🏃 撤', next: 'huashan', effect: { hp: -30 } } ] },
            win: { title: '🏆 勝', text: '【笑傲】葵花破綻！', choices: [ { text: '➡️ 繼續', next: 'huashan', effect: { martial: 35, reputation: 25 }, novel: '笑傲江湖' } ] },
            kuihua: { title: '🗡️ 葵花', text: '【笑傲】欲練此功...', choices: [ { text: '🔪 修煉', next: 'huashan', effect: { martial: 40, inner: -10 }, addItem: '葵花寶典', novel: '笑傲江湖' }, { text: '❌ 放棄', next: 'huashan' } ] },
            mojiao: { title: '🏴‍☠️ 魔教', text: '【笑傲】任我行！', choices: [ { text: '🖐️ 學', next: 'huashan', effect: { inner: 30 }, addItem: '吸星大法', novel: '笑傲江湖' } ] },
            // 覆雨
            huashan: { title: '🏔️ 華山', text: '【大宗師】論劍！\n\n【覆雨翻雲】浪翻雲出現！', choices: [ { text: '⚔️ 浪翻雲', next: 'lang', effect: { martial: 20 } }, { text: '⚔️ 龐斑', next: 'pang', effect: { martial: 20 } }, { text: '👀 觀戰', next: 'watch', effect: { comprehension: 20 } } ] },
            lang: { title: '⚔️ 覆雨', text: '【覆雨】劍如雨下！', choices: [ { text: '💪 應戰', next: 'nujiao', effect: { martial: 30 }, novel: '覆雨翻雲' } ] },
            pang: { title: '⚔️ 龐斑', text: '【覆雨】道心種魔！', choices: [ { text: '⚔️ 應戰', next: 'nujiao', effect: { inner: 30 }, novel: '覆雨翻雲' } ] },
            watch: { title: '👀 觀戰', text: '【大宗師】悟道！', choices: [ { text: '🧠 悟道', next: 'nujiao', effect: { comprehension: 25 } } ] },
            nujiao: { title: '🌊 怒蛟幫', text: '【覆雨】洞庭湖！\n\n浪翻雲vs龐斑！\n\n破碎虛空！', choices: [ { text: '⚔️ 參戰', next: 'nufight', effect: { reputation: 20 } }, { text: '🧘 觀戰', next: 'nuwatch', effect: { comprehension: 25 } }, { text: '🏃 旁觀', next: 'final', effect: { comprehension: 10 } } ] },
            nufight: { title: '⚔️ 大戰', text: '【覆雨】劍氣縱橫！', choices: [ { text: '➡️ 觀戰', next: 'final', effect: { martial: 20, reputation: 20 }, novel: '覆雨翻雲' } ] },
            nuwatch: { title: '👀 巔峰', text: '【覆雨】虛空破碎！\n\n浪翻雲龐斑消失！', choices: [ { text: '🧠 領悟', next: 'final', effect: { comprehension: 30, inner: 20 }, novel: '覆雨翻雲' } ] },
            // 最終
            final: { title: '🏔️ 武林巔峰', text: '挑戰武林盟主！\n\n各路英雄彙集！', choices: [ { text: '⚔️ 挑戰', next: 'boss', effect: { reputation: 30 } }, { text: '🧘 悟道', next: 'wisdom', effect: { inner: 30 } }, { text: '🏆 盟主', next: 'hero_final', effect: { martial: 30 } } ] },
            boss: { title: '⚔️ 大戰', text: '💥 戰鬥激烈！', choices: [ { text: '🏆 獲勝', next: 'victory', effect: { martial: 40 } } ] },
            wisdom: { title: '🧠 悟道', text: '天人合一！', choices: [ { text: '✨ 飛升', next: 'victory', effect: { inner: 50 } } ] },
            hero_final: { title: '🏆 盟主', text: '俠之大者！', choices: [ { text: '👑 登基', next: 'victory', effect: { reputation: 100 } } ] },
            victory: { title: '🎊 通關', text: '🏆 恭喜！\n\n收集：' + (state.inventory.length||0) + '本秘笈\n\n✅ 劍來✅ 天龍✅ 凡人✅ 大唐\n✅ 射鵰✅ 神鵰✅ 倚天✅ 笑傲\n✅ 覆雨\n\n🎮 感謝！', choices: [ { text: '🔄 重新', next: 'restart' } ] },
            restart: { title: '🏮 楔子', text: '大宋年間...\n\n', choices: [ { text: '🏯 少林', next: 'shaolin' }, { text: '🌲 客棧', next: 'inn' }, { text: '⛰️ 閉關', next: 'cultivate' }, { text: '🏔️ 華山', next: 'huashan' }, { text: '🌊 怒蛟', next: 'nujiao' } ] }
        };

        function updateStats() {
            document.getElementById('martial').textContent = state.martial;
            document.getElementById('inner').textContent = state.inner;
            document.getElementById('comprehension').textContent = state.comprehension;
            document.getElementById('hp').textContent = state.hp;
            document.getElementById('hp-fill').style.width = Math.max(0, state.hp) + '%';
            const inv = document.getElementById('inventory');
            inv.innerHTML = state.inventory.length ? '背包：' + state.inventory.map(i => `<span class="item">${i}</span>`).join(' ') : '<span style="color:#666;font-size:0.75rem;">背包：空</span>';
            if (state.hp <= 0) { alert('💀 江湖路遠...'); resetGame(); }
        }
        function resetGame() { state.martial = state.inner = state.comprehension = 10; state.hp = 100; state.inventory = []; renderScene('restart'); updateStats(); }
        function addLog(text) { const l = document.getElementById('log'); const e = document.createElement('div'); e.className = 'log-entry'; e.textContent = text; l.insertBefore(e, l.firstChild); }
        function renderScene(id) {
            const s = scenes[id]; if (!s) return;
            state.currentScene = id;
            document.getElementById('scene-title').textContent = s.title;
            document.getElementById('scene-text').textContent = s.text;
            const cd = document.getElementById('choices'); cd.innerHTML = '';
            s.choices.forEach(c => {
                if (c.condition && !c.condition()) return;
                const b = document.createElement('button'); b.className = 'choice-btn'; b.textContent = c.text;
                b.onclick = () => {
                    if (c.effect) Object.keys(c.effect).forEach(k => { if (k === 'hp') state.hp = Math.min(100, state.hp + c.effect[k]); else state[k] = (state[k] || 0) + c.effect[k]; });
                    if (c.addItem) { state.inventory.push(c.addItem); addLog('🎁 ' + c.addItem); }
                    if (c.novel && !state.novels.includes(c.novel)) { state.novels.push(c.novel); addLog('📖 ' + c.novel); }
                    if (c.reset) { resetGame(); return; }
                    updateStats(); renderScene(c.next);
                };
                cd.appendChild(b);
            });
        }
        updateStats(); renderScene('start');
    </script>
</body>
</html>
