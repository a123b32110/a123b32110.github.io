            victory: {
                title: '🎊 武林至尊',
                text: '═══════════════════\n\n🏆 恭 喜 通 關 ！\n\n═══════════════════\n\n你經歷了：\n\n✅ 劍來 - 齊靜春\n✅ 凡人修仙傳 - 韓立\n✅ 射鵰英雄傳 - 洪七公\n✅ 倚天屠龍記 - 張無忌\n✅ 笑傲江湖 - 令狐沖\n✅ 天龍八部 - 虛竹\n✅ 神鵰俠侶 - 楊過\n\n═══════════════════\n\n🎮 感謝遊玩《武俠傳說》\n═══════════════════',
                choices: [ { text: '🔄 重新開始', next: 'restart' } ]
            },
            restart: { title: '🏮 楔子', text: '大宋年間，江湖動亂...\n\n', choices: [ { text: '🏯 少林寺', next: 'shaolin' }, { text: '🌲 客棧', next: 'inn' }, { text: '⛰️ 閉關', next: 'cultivate' }, { text: '🗡️ 華山', next: 'huashan' } ] }
        };

        function updateStats() {
            document.getElementById('martial').textContent = state.martial;
            document.getElementById('inner').textContent = state.inner;
            document.getElementById('comprehension').textContent = state.comprehension;
            document.getElementById('hp').textContent = state.hp;
            document.getElementById('hp-fill').style.width = Math.max(0, state.hp) + '%';
            const inv = document.getElementById('inventory');
            inv.innerHTML = state.inventory.length ? '背包：' + state.inventory.map(i => `<span class="item">${i}</span>`).join(' ') : '<span style="color:#888;font-size:0.8rem;">背包：空</span>';
            if (state.hp <= 0) { alert('💀 你已身負重傷，江湖路遠...'); resetGame(); }
        }
        function resetGame() { state.martial = state.inner = state.comprehension = 10; state.hp = 100; state.inventory = []; renderScene('restart'); updateStats(); }
        function addLog(text) { const l = document.getElementById('log'); const e = document.createElement('div'); e.className = 'log-entry'; e.textContent = text; l.insertBefore(e, l.firstChild); }
        function renderScene(id) {
            const s = scenes[id]; if (!s) return;
            state.currentScene = id;
            document.getElementById('scene-title').textContent = s.title;
            document.getElementById('scene-text').textContent = s.text;
            const cd = document.getElementById('choices'); cd.innerHTML = '';
            s.choices.forEach(c => {
                if (c.condition && !c.condition()) return;
                const b = document.createElement('button'); b.className = 'choice-btn'; b.textContent = c.text;
                b.onclick = () => {
                    if (c.effect) Object.keys(c.effect).forEach(k => { if (k === 'hp') state.hp = Math.min(100, state.hp + c.effect[k]); else state[k] = (state[k] || 0) + c.effect[k]; });
                    if (c.addItem) { state.inventory.push(c.addItem); addLog('🎁 獲得：' + c.addItem); }
                    if (c.reset) { resetGame(); return; }
                    updateStats(); renderScene(c.next);
                };
                cd.appendChild(b);
            });
        }
        updateStats(); renderScene('start');
    </script>
</body>
</html>
