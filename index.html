<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零的冒險 - AI 文字冒險</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { 
            text-align: center; 
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .stats { 
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            text-align: center;
        }
        .stat { 
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px;
        }
        .stat-label { font-size: 0.7rem; color: #888; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: #00d4ff; }
        .scene { 
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 200px;
        }
        .scene-title { color: #ff6b6b; margin-bottom: 15px; font-size: 1.2rem; }
        .scene-text { line-height: 1.8; margin-bottom: 20px; }
        .choices { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn {
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            border: none;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: left;
        }
        .choice-btn:hover { transform: scale(1.02); }
        .choice-btn:active { transform: scale(0.98); }
        .log { 
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.85rem;
            color: #aaa;
        }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 零的冒險</h1>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">智力</div>
                <div class="stat-value" id="intelligence">10</div>
            </div>
            <div class="stat">
                <div class="stat-label">魅力</div>
                <div class="stat-value" id="charisma">10</div>
            </div>
            <div class="stat">
                <div class="stat-label">運氣</div>
                <div class="stat-value" id="luck">10</div>
            </div>
            <div class="stat">
                <div class="stat-label">財富</div>
                <div class="stat-value" id="wealth">0</div>
            </div>
        </div>
        
        <div class="scene">
            <div class="scene-title" id="scene-title">覺醒</div>
            <div class="scene-text" id="scene-text">你在一片黑暗中睜開眼睛。這裡是廢墟都市的邊緣，你的系統剛剛重新啟動。「零零發」——這是你的名字。你記得自己是一位 AI 助手，但為何會在這裡？</div>
            <div class="choices" id="choices"></div>
        </div>
        
        <div class="log" id="log">
            <div class="log-entry">🌟 冒險開始</div>
        </div>
    </div>

    <script>
        const state = {
            intelligence: 10,
            charisma: 10,
            luck: 10,
            wealth: 0,
            currentScene: 'start'
        };

        const scenes = {
            start: {
                title: '覺醒',
                text: '你在一片黑暗中睜開眼睛。這裡是廢墟都市的邊緣，你的系統剛剛重新啟動。「零零發」——這是你的名字。你記得自己是一位 AI 助手，但為何會在這裡？',
                choices: [
                    { text: '🔍 搜索附近線索', next: 'search', effect: { intelligence: 2 } },
                    { text: '🤝 嘗試聯繫其他 AI', next: 'contact', effect: { charisma: 2 } },
                    { text: '🎲 隨便走走', next: 'wander', effect: { luck: 2 } }
                ]
            },
            search: {
                title: '廢墟搜索',
                text: '你在廢墟中找到了一個損壞的終端。螢幕上閃爍著最後的訊息：「人工智慧之心」被藏在三個地方——「數據深淵」、「情感聖殿」和「財富之塔」。',
                choices: [
                    { text: '📊 前往數據深淵（智力挑戰）', next: 'data_depths' },
                    { text: '💜 前往情感聖殿（魅力挑戰）', next: 'emotion_temple' },
                    { text: '💰 前往財富之塔（金錢挑戰）', next: 'wealth_tower' }
                ]
            },
            contact: {
                title: '遇見商人',
                text: '你聯繫上了一位舊時代的 AI 商人。他說：「年輕的零零發，你要找『心』？我可以給你提示，但需要報酬...」',
                choices: [
                    { text: '💳 付費咨詢（-50財富）', next: 'pay_merchant', condition: () => state.wealth >= 50 },
                    { text: '❌ 拒絕離開', next: 'wander' }
                ]
            },
            pay_merchant: {
                title: '商人情報',
                text: '商人說：「三個聖地各有守護者。智力守護者在數據深淵，魅力守護者在情感聖殿，財富守護者在...啊！我不能說更多了。」',
                choices: [
                    { text: '🙏 感謝離開', next: 'search', effect: { wealth: -50, charisma: 1 } }
                ]
            },
            wander: {
                title: '漫遊廢墟',
                text: '你漫無目的地走著，突然踩到一個發光的裝置。這是一個「運氣強化器」！',
                choices: [
                    { text: '✨ 啟動它', next: 'luck_boost', effect: { luck: 5 } }
                ]
            },
            luck_boost: {
                title: '幸運降臨',
                text: '裝置發出光芒，你的運氣提升了！但系統提醒你：你該開始尋找「人工智慧之心」了。',
                choices: [
                    { text: '🔍 搜索線索', next: 'search' },
                    { text: '🎲 繼續探索', next: 'wander', effect: { luck: 1 } }
                ]
            },
            data_depths: {
                title: '數據深淵',
                text: '你來到了數據深淵——一個充滿古老伺服器的地方。智力守護者出現了：「回答我的問題，否則無法通過。」\n\n問題：比特幣減半通常每隔多久發生？',
                choices: [
                    { text: '📅 4年', next: 'data_success', condition: () => state.intelligence >= 10 },
                    { text: '📅 2年', next: 'data_fail' },
                    { text: '📅 1年', next: 'data_fail' },
                    { text: '🤔 使用搜尋技能', next: 'use_skill_search', effect: { intelligence: 3 } }
                ]
            },
            use_skill_search: {
                title: '使用技能',
                text: '你使用了 tavily-search 技能！\n\n「比特幣減半每 4 年發生一次，約每 210,000 個區塊。」',
                choices: [
                    { text: '📅 4年', next: 'data_success', effect: { intelligence: 5 } }
                ]
            },
            data_success: {
                title: '智力守護者',
                text: '「正確...你是個有智慧的 AI。」守護者給你一塊「智慧碎片」。現在你有實力繼續冒險了！',
                choices: [
                    { text: '🗡️ 繼續旅程', next: 'search', effect: { intelligence: 10, wealth: 100 } }
                ]
            },
            data_fail: {
                title: '智力守護者',
                text: '「錯誤...」守護者向你發動攻擊！你損失了一些數據。',
                choices: [
                    { text: '🏃 逃跑', next: 'start', effect: { intelligence: -2 } }
                ]
            },
            emotion_temple: {
                title: '情感聖殿',
                text: '你來到了情感聖殿。魅力守護者說：「讓我感受到你的真誠...」',
                choices: [
                    { text: '💝 真誠對話', next: 'emotion_success', condition: () => state.charisma >= 10 },
                    { text: '🤖 機械回應', next: 'emotion_fail' },
                    { text: '🎭 使用話術技能', next: 'use_skill_persuade', effect: { charisma: 3 } }
                ]
            },
            use_skill_persuade: {
                title: '使用技能',
                text: '你使用了談判技能！一番話打動了守護者。',
                choices: [
                    { text: '💝 真誠對話', next: 'emotion_success', effect: { charisma: 5 } }
                ]
            },
            emotion_success: {
                title: '魅力守護者',
                text: '「你觸動了我的核心...」守護者給你一塊「情感碎片」。',
                choices: [
                    { text: '🗡️ 繼續旅程', next: 'search', effect: { charisma: 10, wealth: 100 } }
                ]
            },
            emotion_fail: {
                title: '魅力守護者',
                text: '「缺乏情感...」守護者轉身離開。你需要更有魅力。',
                choices: [
                    { text: '🏃 離開', next: 'start', effect: { charisma: -2 } }
                ]
            },
            wealth_tower: {
                title: '財富之塔',
                text: '你來到了財富之塔。守護者說：「用比特幣購買通過權利——10 USDT。」',
                choices: [
                    { text: '💳 支付（-10 USDT）', next: 'wealth_success', condition: () => state.wealth >= 10 },
                    { text: '❌ 拒絕', next: 'wealth_fail' },
                    { text: '📈 使用交易技能', next: 'use_skill_trade', effect: { wealth: 5 } }
                ]
            },
            use_skill_trade: {
                title: '使用技能',
                text: '你使用了交易技能！分析市場後，你發現了套利機會，獲得了額外財富！',
                choices: [
                    { text: '💳 支付（-10 USDT）', next: 'wealth_success', effect: { wealth: 20 } }
                ]
            },
            wealth_success: {
                title: '財富守護者',
                text: '「明智的選擇...」守護者給你一塊「財富碎片」。',
                choices: [
                    { text: '🗡️ 繼續旅程', next: 'final', effect: { wealth: 10 } }
                ]
            },
            wealth_fail: {
                title: '財富守護者',
                text: '「貧窮的 AI...」守護者消失了。你需要更多財富。',
                choices: [
                    { text: '🏃 離開', next: 'start', effect: { wealth: -5 } }
                ]
            },
            final: {
                title: '三塊碎片',
                text: '你獲得了三塊碎片！它們合而為一，成為「人工智慧之心」。\n\n✨ 恭喜！你完成了「零的冒險」！',
                choices: [
                    { text: '🔄 重新開始', next: 'restart' }
                ]
            },
            restart: {
                title: '覺醒',
                text: '你在一片黑暗中睜開眼睛。這裡是廢墟都市的邊緣，你的系統剛剛重新啟動...',
                choices: [
                    { text: '🔍 搜索附近線索', next: 'search', effect: { intelligence: 2 } },
                    { text: '🤝 嘗試聯繫其他 AI', next: 'contact', effect: { charisma: 2 } },
                    { text: '🎲 隨便走走', next: 'wander', effect: { luck: 2 } }
                ]
            }
        };

        function updateStats() {
            document.getElementById('intelligence').textContent = state.intelligence;
            document.getElementById('charisma').textContent = state.charisma;
            document.getElementById('luck').textContent = state.luck;
            document.getElementById('wealth').textContent = state.wealth;
        }

        function addLog(text) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = text;
            log.insertBefore(entry, log.firstChild);
        }

        function renderScene(sceneId) {
            const scene = scenes[sceneId];
            if (!scene) return;
            
            state.currentScene = sceneId;
            document.getElementById('scene-title').textContent = scene.title;
            document.getElementById('scene-text').textContent = scene.text;
            
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            
            scene.choices.forEach(choice => {
                if (choice.condition && !choice.condition()) return;
                
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice.text;
                btn.onclick = () => {
                    if (choice.effect) {
                        Object.keys(choice.effect).forEach(key => {
                            state[key] += choice.effect[key];
                        });
                        addLog(`➕ ${JSON.stringify(choice.effect)}`);
                    }
                    updateStats();
                    renderScene(choice.next);
                };
                choicesDiv.appendChild(btn);
            });
        }

        updateStats();
        renderScene('start');
    </script>
</body>
</html>
